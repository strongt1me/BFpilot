<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/icon.png">
  <title>BFpilot</title>
  <style>
    :root {
      --paper: #090d12;
      --panel: #111821;
      --panel-2: #151f2a;
      --ink: #edf4f2;
      --soft: #182330;
      --line: #293645;
      --muted: #9aa8b6;
      --deep: #34d399;
      --deep-2: #5ee0aa;
      --mint: #123326;
      --sky: #17314a;
      --gold: #3d3218;
      --rose: #3b1d23;
      --red: #ff8585;
      --shadow: rgba(0, 0, 0, 0.45);
      --focus: rgba(94, 224, 170, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font: 14px/1.35 Arial, Helvetica, sans-serif;
      letter-spacing: 0;
    }

    body {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--ink);
      padding: 0 11px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover:not(:disabled),
    button:focus-visible,
    input:focus-visible {
      border-color: var(--deep-2);
      box-shadow: 0 0 0 3px var(--focus);
      outline: none;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    button.primary {
      border-color: var(--deep-2);
      background: var(--deep);
      color: #06130e;
      font-weight: 700;
    }

    button.danger {
      border-color: #71333a;
      background: var(--rose);
      color: var(--red);
    }

    button.warn {
      border-color: #8a6f2d;
      background: var(--gold);
    }

    .top {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .top-inner {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 10px 14px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .brand {
      width: 46px;
      height: 46px;
      display: block;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 0 0 1px var(--line), 0 6px 16px rgba(52, 211, 153, 0.16);
    }

    .title {
      min-width: 0;
    }

    .title > strong {
      display: block;
      font-size: 18px;
    }

    .title > span {
      color: var(--muted);
      font-size: 12px;
    }

    .storage-summary {
      margin-top: 3px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }

    .storage-summary span {
      min-width: 0;
      max-width: 100%;
      border: 0;
      background: transparent;
      padding: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .storage-summary span + span::before {
      content: "· ";
      color: #667789;
    }

    .storage-summary strong {
      display: inline;
      color: var(--ink);
      font-size: inherit;
      font-weight: 600;
    }

    .status {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--soft);
      padding: 0 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #566575;
    }

    .status.ready .dot {
      background: var(--deep);
    }

    .shell {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 14px;
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr) 300px;
      gap: 12px;
      min-height: 0;
    }

    .rail,
    .browser,
    .target,
    .job {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 22px var(--shadow);
      min-width: 0;
    }

    .rail {
      padding: 10px;
      align-self: start;
      display: grid;
      gap: 8px;
      overflow: hidden;
    }

    .rail-list,
    .rail-tools {
      display: grid;
      gap: 6px;
    }

    .rail-title {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .rail button {
      width: 100%;
      min-width: 0;
      justify-content: flex-start;
      text-align: left;
      background: var(--soft);
      white-space: normal;
      padding: 6px 10px;
      min-height: 34px;
    }

    .rail button.active {
      border-color: var(--deep-2);
      background: var(--mint);
      color: var(--deep);
      font-weight: 700;
    }

    .place-label {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .place-meta {
      display: block;
      margin-top: 1px;
      color: var(--muted);
      font-size: 10.5px;
      font-weight: 400;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .browser {
      min-height: 650px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      overflow: hidden;
    }

    .pathbar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: var(--soft);
    }

    .path {
      width: 100%;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0c1219;
      color: var(--ink);
      padding: 0 10px;
      font-family: Consolas, Menlo, monospace;
    }

    .actions {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
    }

    .count {
      margin-left: auto;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .file-head,
    .file-row {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 92px 112px;
      gap: 8px;
      align-items: center;
    }

    .file-head {
      position: sticky;
      top: 0;
      z-index: 1;
      min-height: 34px;
      padding: 0 12px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .list {
      min-height: 0;
      overflow: auto;
    }

    .file-row {
      min-height: 42px;
      padding: 0 12px;
      border-bottom: 1px solid #202a36;
      cursor: default;
      user-select: none;
    }

    .file-row:hover {
      background: #172231;
    }

    .file-row.selected {
      background: var(--sky);
    }

    .file-row.parent {
      color: var(--muted);
    }

    .tag {
      min-width: 0;
      display: inline-flex;
      justify-content: center;
      border-radius: 5px;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--muted);
      padding: 3px 0;
      font-size: 11px;
      font-weight: 700;
    }

    .file-row.dir .tag {
      border-color: #27724e;
      background: var(--mint);
      color: var(--deep);
    }

    .name,
    .muted-cell {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .muted-cell {
      color: var(--muted);
      font-size: 12px;
    }

    .target {
      align-self: start;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .target h2 {
      margin: 0;
      font-size: 15px;
    }

    .target-path {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0c1219;
      color: var(--ink);
      padding: 0 10px;
      font-family: Consolas, Menlo, monospace;
    }

    .target-buttons,
    .target-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .target-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .target-grid button {
      background: var(--soft);
      min-width: 0;
      padding: 7px 9px;
      overflow-wrap: anywhere;
      white-space: normal;
      font-family: Consolas, Menlo, monospace;
      font-size: 12px;
      line-height: 1.25;
    }

    .target-label {
      display: block;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .target-meta {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-family: Consolas, Menlo, monospace;
      font-size: 10.5px;
      font-weight: 400;
      overflow-wrap: anywhere;
    }

    .detail {
      min-height: 146px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0c1219;
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
    }

    .detail strong {
      display: block;
      color: var(--ink);
      font-size: 13px;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detail-grid {
      display: grid;
      gap: 6px;
    }

    .detail-row {
      min-width: 0;
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 8px;
      align-items: baseline;
    }

    .detail-row span:first-child {
      color: var(--muted);
    }

    .detail-row span:last-child {
      min-width: 0;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detail-note {
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid #25313e;
      color: var(--muted);
    }

    .job {
      position: fixed;
      left: 50%;
      bottom: 14px;
      z-index: 10;
      width: min(840px, calc(100% - 28px));
      transform: translateX(-50%);
      display: none;
      grid-template-columns: 110px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
    }

    .job.show {
      display: grid;
    }

    .meter {
      height: 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: var(--soft);
    }

    .meter-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--deep), #85f2bf);
    }

    .job-text {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
      white-space: normal;
    }

    .toast {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 12;
      max-width: min(460px, calc(100% - 28px));
      display: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 12px 28px var(--shadow);
      padding: 10px 12px;
    }

    .toast.show {
      display: block;
    }

    .toast.err {
      border-color: #71333a;
      background: var(--rose);
    }

    .toast.ok {
      border-color: #27724e;
      background: var(--mint);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 1080px) {
      .shell {
        grid-template-columns: 132px minmax(0, 1fr);
      }

      .target {
        grid-column: 1 / -1;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        align-items: start;
      }

      .target h2,
      .detail {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 700px) {
      .top-inner {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .status {
        grid-column: 1 / -1;
      }

      .storage-summary span {
        max-width: calc(100vw - 96px);
      }

      .shell {
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .rail {
        display: grid;
      }

      .rail button {
        width: 100%;
      }

      .pathbar {
        grid-template-columns: auto minmax(0, 1fr) auto;
      }

      .pathbar #refresh {
        grid-column: 1 / -1;
      }

      .actions {
        flex-wrap: nowrap;
      }

      .file-head,
      .file-row {
        grid-template-columns: 40px minmax(0, 1fr) 78px;
      }

      .file-head span:last-child,
      .file-row .mtime {
        display: none;
      }

      .browser {
        min-height: 540px;
      }

      .target {
        grid-template-columns: 1fr;
      }

      .job {
        grid-template-columns: 1fr auto;
      }

      .job .meter,
      .job-text {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <img class="brand" src="/icon.png" alt="">
      <div class="title">
        <strong>BFpilot</strong>
        <span id="build">File Manager</span>
        <div class="storage-summary" id="storage-summary">
          <span>Storage: loading</span>
        </div>
      </div>
      <div class="status" id="status"><span class="dot"></span><span>Connecting</span></div>
    </div>
  </header>

  <main class="shell">
    <nav class="rail" aria-label="Places">
      <div class="rail-title">Places</div>
      <div class="rail-list" id="places"></div>
      <div class="rail-tools">
        <button id="add-shortcut">Add Shortcut</button>
        <button id="remove-shortcut">Remove Shortcut</button>
        <button id="customize-shortcut">Customize Shortcut</button>
      </div>
    </nav>

    <section class="browser" aria-label="Files">
      <div class="pathbar">
        <button id="up">Up</button>
        <input id="path" class="path" spellcheck="false" value="/data">
        <button id="go" class="primary">Go</button>
        <button id="refresh">Refresh</button>
      </div>

      <div class="actions">
        <button id="new-folder">New Folder</button>
        <button id="rename">Rename</button>
        <button id="download">Download</button>
        <button id="extract" class="primary">Extract</button>
        <button id="upload-files" class="warn">Upload Files</button>
        <button id="upload-folder" class="warn">Upload Folder</button>
        <button id="delete" class="danger">Delete</button>
        <span id="selection" class="count">0 selected</span>
      </div>

      <div class="list" id="list">
        <div class="file-head">
          <span>Kind</span>
          <span>Name</span>
          <span>Type</span>
          <span>Modified</span>
        </div>
      </div>
    </section>

    <aside class="target" aria-label="Transfer target">
      <h2>Target</h2>
      <input id="target-path" class="target-path" spellcheck="false" value="/data">
      <div class="target-buttons">
        <button id="copy" class="primary">Copy Here</button>
        <button id="move">Move Here</button>
      </div>
      <div class="target-grid" id="target-grid"></div>
      <div class="target-actions">
        <button id="target-current">Current</button>
        <button id="open-target">Open</button>
      </div>
      <div class="detail" id="detail">
        <strong>No selection</strong>
        <span>Ready</span>
      </div>
    </aside>
  </main>

  <section id="job" class="job" aria-live="polite">
    <strong id="job-verb">Working</strong>
    <div class="meter"><div id="job-fill" class="meter-fill"></div></div>
    <button id="job-cancel">Cancel</button>
    <span id="job-text" class="job-text"></span>
  </section>

  <input id="file-picker" class="hidden" type="file" multiple>
  <input id="folder-picker" class="hidden" type="file" multiple webkitdirectory directory>
  <div id="toast" class="toast"></div>

  <script>
    const state = {
      path: '/data',
      entries: [],
      places: [
        { label: 'Root', path: '/', kind: 'root' },
        { label: 'Homebrew', path: '/data/homebrew', kind: 'homebrew' },
        { label: 'Mounts', path: '/mnt', kind: 'mounts' },
        { label: 'User', path: '/user', kind: 'user' },
        { label: 'Data', path: '/data', kind: 'internal' }
      ],
      selected: new Set(),
      detailToken: 0,
      uploadBusy: false,
      uploadAbort: false,
      uploadXhr: null,
      placesTimer: 0,
      jobTimer: 0,
      jobHideTimer: 0,
      archiveTimer: 0
    };

    function el(id) {
      return document.getElementById(id);
    }

    function cleanPath(path) {
      if (!path || path[0] !== '/') return '/';
      return path.replace(/\/+/g, '/').replace(/\/$/, '') || '/';
    }

    function parentPath(path) {
      path = cleanPath(path);
      if (path === '/') return '/';
      const i = path.lastIndexOf('/');
      return i <= 0 ? '/' : path.slice(0, i);
    }

    function joinPath(dir, name) {
      dir = cleanPath(dir);
      return dir === '/' ? '/' + name : dir + '/' + name;
    }

    function fileUrl(path) {
      return '/fs' + cleanPath(path).split('/').map(encodeURIComponent).join('/');
    }

    function api(url) {
      return fetch(url, { cache: 'no-store' }).then(async (response) => {
        const body = await response.json().catch(() => ({}));
        if (!response.ok || body.ok === false) {
          throw new Error(body.error || ('HTTP ' + response.status));
        }
        return body;
      });
    }

    function postForm(url, fields) {
      const body = new URLSearchParams();
      Object.keys(fields).forEach((key) => body.set(key, fields[key]));
      return fetch(url, {
        method: 'POST',
        cache: 'no-store',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body
      }).then(async (response) => {
        const data = await response.json().catch(() => ({}));
        if (!response.ok || data.ok === false) {
          throw new Error(data.error || ('HTTP ' + response.status));
        }
        return data;
      });
    }

    function toast(message, kind) {
      const box = el('toast');
      box.textContent = message;
      box.className = 'toast show ' + (kind || '');
      clearTimeout(box._timer);
      box._timer = setTimeout(() => {
        box.className = 'toast';
      }, 3200);
    }

    function sortEntries(entries) {
      return entries.slice().sort((a, b) => {
        if (a.dir !== b.dir) return a.dir ? -1 : 1;
        return a.name.localeCompare(b.name);
      });
    }

    function shortSize(size) {
      if (!Number.isFinite(size) || size < 0) return '';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      let value = size;
      let unit = 0;
      while (value >= 1024 && unit < units.length - 1) {
        value /= 1024;
        unit++;
      }
      return (unit ? value.toFixed(value >= 10 ? 0 : 1) : value.toFixed(0)) + ' ' + units[unit];
    }

    function exactSize(size) {
      if (!Number.isFinite(size) || size < 0) return 'Unknown';
      return shortSize(size) + ' (' + Math.round(size).toLocaleString() + ' bytes)';
    }

    function storageSummary(place) {
      if (!place || !place.statvfs || !Number.isFinite(place.totalBytes) || place.totalBytes <= 0) {
        return '';
      }
      const availableValue = Number(place.availableBytes);
      const free = Number.isFinite(availableValue) ? availableValue : Number(place.freeBytes || 0);
      const total = Number(place.usableTotalBytes || place.totalBytes || 0);
      const pctValue = Number(place.usableUsedPercent);
      const pct = Number.isFinite(pctValue) ? pctValue : Number(place.usedPercent || 0);
      const reserved = Number(place.reservedBytes || 0);
      let summary = shortSize(free) + ' usable free of ' + shortSize(total) +
        ', ' + pct.toFixed(0) + '% used';
      if (reserved > 0) summary += ', ' + shortSize(reserved) + ' reserved';
      return summary;
    }

    function placeSubtitle(place) {
      return cleanPath(place.path || '/');
    }

    function placeButton(place, onClick) {
      const button = document.createElement('button');
      button.dataset.path = cleanPath(place.path);
      button.title = cleanPath(place.path);

      const label = document.createElement('span');
      label.className = 'place-label';
      label.textContent = place.label || cleanPath(place.path);
      button.appendChild(label);

      const meta = document.createElement('span');
      meta.className = 'place-meta';
      meta.textContent = placeSubtitle(place);
      button.appendChild(meta);

      button.addEventListener('click', onClick);
      return button;
    }

    function renderStorageSummary() {
      const box = el('storage-summary');
      box.textContent = '';
      const seen = new Set();
      const items = [];
      for (const place of state.places) {
        if (!place.statvfs || Number(place.totalBytes || 0) <= 0) continue;
        if (place.kind !== 'internal' && place.kind !== 'usb' && place.kind !== 'ext') continue;
        const key = place.kind === 'internal' ? 'internal' : cleanPath(place.path);
        if (seen.has(key)) continue;
        seen.add(key);
        items.push(place);
      }
      if (!items.length) {
        const empty = document.createElement('span');
        empty.textContent = 'Storage: waiting for data';
        box.appendChild(empty);
        return;
      }
      for (const place of items) {
        const item = document.createElement('span');
        const title = document.createElement('strong');
        title.textContent = place.kind === 'internal'
          ? 'Data'
          : cleanPath(place.path);
        item.appendChild(title);
        item.appendChild(document.createTextNode(': ' + (storageSummary(place) || 'unknown')));
        item.title = cleanPath(place.path);
        box.appendChild(item);
      }
    }

    function targetButton(place, path) {
      const button = document.createElement('button');
      button.dataset.path = path;
      if (place.custom) {
        const label = document.createElement('span');
        label.className = 'target-label';
        label.textContent = place.label || path;
        button.appendChild(label);

        const meta = document.createElement('span');
        meta.className = 'target-meta';
        meta.textContent = path;
        button.appendChild(meta);
      } else {
        button.textContent = path;
      }
      button.title = (place.label ? place.label + ' | ' : '') + path;
      button.addEventListener('click', () => {
        el('target-path').value = path;
        updatePlaces();
      });
      return button;
    }

    function renderTargetButtons() {
      const grid = el('target-grid');
      grid.textContent = '';
      const seen = new Set();
      for (const path of ['/data', '/data/homebrew']) {
        const place = state.places.find((item) => cleanPath(item.path) === path) ||
          { label: path, path, kind: 'target' };
        grid.appendChild(targetButton(place, path));
        seen.add(path);
      }
      for (const place of state.places) {
        if (!place.custom) continue;
        const path = cleanPath(place.path);
        if (seen.has(path)) continue;
        seen.add(path);
        grid.appendChild(targetButton(place, path));
      }
    }

    function renderPlaces() {
      const root = el('places');
      root.textContent = '';
      const seen = new Set();
      for (const place of state.places) {
        const clean = cleanPath(place.path);
        if (seen.has(clean)) continue;
        seen.add(clean);
        root.appendChild(placeButton(place, () => openPath(clean)));
      }
      renderTargetButtons();
      renderStorageSummary();
      updatePlaces();
    }

    async function refreshPlaces(quiet) {
      try {
        const data = await api('/api/fs/places');
        state.places = (data.places || []).map((place) => {
          place.path = cleanPath(place.path || '/');

          { label: 'Mounts', path: '/mnt', kind: 'mounts' },
          { label: 'User', path: '/user', kind: 'user' },

    async function customizeShortcut() {

    function shortDuration(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return 'unknown';
      seconds = Math.round(seconds);
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h) return h + 'h ' + m + 'm';
      if (m) return m + 'm ' + s + 's';
      return s + 's';
    }

    function speedMBps(bytesPerSecond) {
      if (!Number.isFinite(bytesPerSecond) || bytesPerSecond <= 0) return '';
      const mb = bytesPerSecond / (1024 * 1024);
      return mb.toFixed(mb >= 10 ? 1 : 2) + ' MB/s';
    }

    function isArchiveName(name) {
      const lower = String(name || '').toLowerCase();
      return lower.endsWith('.zip') ||
        lower.endsWith('.rar') ||
        lower.endsWith('.7z') ||
        lower.endsWith('.7z.001') ||
        /\.part\d+\.rar$/.test(lower) ||
        /\.r\d\d$/.test(lower);
    }

    function archiveStem(name) {
      let stem = String(name || 'archive');
      const lower = stem.toLowerCase();
      if (lower.endsWith('.7z.001')) return stem.slice(0, -7);
      if (lower.endsWith('.part1.rar')) return stem.slice(0, -10);
      if (/\.part\d+\.rar$/i.test(stem)) {
        return stem.replace(/\.part\d+\.rar$/i, '');
      }
      if (/\.(zip|rar|7z)$/i.test(stem)) return stem.replace(/\.(zip|rar|7z)$/i, '');
      if (/\.r\d\d$/i.test(stem)) return stem.replace(/\.r\d\d$/i, '');
      return stem;
    }

    function formatDate(seconds) {
      if (!Number.isFinite(seconds) || seconds <= 0) return 'Unknown';
      return new Date(seconds * 1000).toLocaleString();
    }

    function jobProgressText(job) {
      const copied = Number(job.copiedBytes || 0);
      const total = Number(job.totalBytes || 0);
      const doneFiles = Number(job.doneFiles || 0);
      const totalFiles = Number(job.totalFiles || 0);
      const failedFiles = Number(job.failedFiles || 0);
      const elapsed = Math.max(0, (Date.now() / 1000) - Number(job.startedAt || 0));
      const reportedSpeed = Number(job.speedBytesPerSec || 0);
      const speed = reportedSpeed > 0 ? reportedSpeed :
        (elapsed > 0 && copied > 0 ? copied / elapsed : 0);
      const reportedEta = Number(job.etaSeconds || 0);
      const pct = total > 0 ? Math.max(0, Math.min(100, (copied / total) * 100)) : 0;
      const parts = [];

      if (total > 0) {
        parts.push(shortSize(copied) + ' / ' + shortSize(total));
        parts.push(pct.toFixed(1) + '%');
      } else if (job.busy) {
        parts.push(job.current || 'Preparing');
      }

      if (totalFiles > 0) {
        parts.push(doneFiles + ' / ' + totalFiles + ' items');
      }

      if (speed > 0) {
        parts.push(speedMBps(speed));
        if (reportedEta > 0) {
          parts.push('ETA ' + shortDuration(reportedEta));
        } else if (total > copied) {
          parts.push('ETA ' + shortDuration((total - copied) / speed));
        }
      }

      if (failedFiles > 0) parts.push(failedFiles + ' failed');
      if (job.cancelling) parts.push('cancelling');

      if (job.current && total > 0) parts.push(job.current);
      if (!parts.length) return job.error || 'Done';
      return parts.join(' | ');
    }

    function setJobBox(verb, text, pct) {
      if (state.jobTimer) {
        clearInterval(state.jobTimer);
        state.jobTimer = 0;
      }
      if (state.jobHideTimer) {
        clearTimeout(state.jobHideTimer);
        state.jobHideTimer = 0;
      }
      el('job').classList.add('show');
      el('job-verb').textContent = verb || 'Working';
      el('job-text').textContent = text || '';
      el('job-fill').style.width = Math.max(0, Math.min(100, pct || 0)).toFixed(1) + '%';
      el('job-cancel').disabled = false;
    }

    function uploadProgressText(doneBytes, totalBytes, startedAt, index, count, name, failed, cancelling) {
      const elapsed = Math.max(0, (Date.now() - startedAt) / 1000);
      const speed = elapsed > 0 && doneBytes > 0 ? doneBytes / elapsed : 0;
      const pct = totalBytes > 0 ? Math.max(0, Math.min(100, (doneBytes / totalBytes) * 100)) : 0;
      const parts = [];

      if (totalBytes > 0) {
        parts.push(shortSize(doneBytes) + ' / ' + shortSize(totalBytes));
        parts.push(pct.toFixed(1) + '%');
      } else {
        parts.push('Preparing');
      }

      parts.push(Math.min(index + 1, count) + ' / ' + count + ' files');
      if (speed > 0) {
        parts.push(speedMBps(speed));
        if (totalBytes > doneBytes) {
          parts.push('ETA ' + shortDuration((totalBytes - doneBytes) / speed));
        }
      }
      if (failed > 0) parts.push(failed + ' failed');
      if (cancelling) parts.push('cancelling');
      if (name) parts.push(name);

      return parts.join(' | ');
    }

    function updateUploadJob(doneBytes, totalBytes, startedAt, index, count, name, failed, cancelling) {
      const pct = totalBytes > 0 ? (doneBytes / totalBytes) * 100 : 0;
      setJobBox('upload', uploadProgressText(
        doneBytes, totalBytes, startedAt, index, count, name, failed, cancelling
      ), pct);
    }

    function archiveProgressText(job) {
      const pct = Number(job.percent || 0);
      const written = Number(job.bytesWritten || 0);
      const total = Number(job.totalBytes || 0);
      const parts = [];
      if (job.state === 'prepared') {
        parts.push('Job prepared');
        parts.push(job.requiresInjection ? 'inject bfpilot-archive-worker.elf to start' : 'starting');
      } else {
        parts.push(job.state || 'archive');
      }
      if (job.archiveType && job.archiveType !== 'pending') parts.push(job.archiveType);
      if (total > 0) {
        parts.push(shortSize(written) + ' / ' + shortSize(total));
      }
      if (pct > 0) parts.push(Math.max(0, Math.min(100, pct)).toFixed(0) + '%');
      if (job.averageMBps > 0) parts.push(Number(job.averageMBps).toFixed(2) + ' MB/s');
      if (job.filesDone || job.totalFiles) {
        parts.push(Number(job.filesDone || 0) + ' / ' + Number(job.totalFiles || 0) + ' files');
      }
      if (job.current) parts.push(job.current);
      if (job.error) parts.push(job.error);
      return parts.join(' | ');
    }

    function pollArchiveStatus() {
      const box = el('job');
      const fill = el('job-fill');
      const text = el('job-text');
      const verb = el('job-verb');
      const cancel = el('job-cancel');

      if (state.archiveTimer) clearInterval(state.archiveTimer);
      if (state.jobHideTimer) {
        clearTimeout(state.jobHideTimer);
        state.jobHideTimer = 0;
      }
      box.classList.add('show');
      verb.textContent = 'extract';
      text.textContent = 'Waiting for archive status';
      cancel.disabled = true;
      let missed = 0;

      async function tick() {
        try {
          const job = await api('/api/fs/archive/status');
          missed = 0;
          const pct = Math.max(0, Math.min(100, Number(job.percent || 0)));
          fill.style.width = pct.toFixed(1) + '%';
          verb.textContent = 'extract';
          text.textContent = archiveProgressText(job);
          cancel.disabled = true;

          if (job.state === 'idle') {
            clearInterval(state.archiveTimer);
            state.archiveTimer = 0;
            box.classList.remove('show');
            cancel.disabled = false;
          } else if (job.state === 'done' || job.state === 'error') {
            clearInterval(state.archiveTimer);
            state.archiveTimer = 0;
            toast(job.state === 'done' ? 'Archive extracted' : ('extract: ' + (job.error || 'failed')),
              job.state === 'done' ? 'ok' : 'err');
            if (job.state === 'done') refresh();
            state.jobHideTimer = setTimeout(() => {
              state.jobHideTimer = 0;
              cancel.disabled = false;
              if (!state.uploadBusy && !state.jobTimer && !state.archiveTimer) {
                box.classList.remove('show');
              }
            }, 2800);
          }
        } catch (err) {
          missed++;
          text.textContent = 'Waiting for archive status...';
          if (missed >= 120) {
            clearInterval(state.archiveTimer);
            state.archiveTimer = 0;
            cancel.disabled = false;
            box.classList.remove('show');
            toast('archive status: ' + err.message, 'err');
          }
        }
      }

      tick();
      state.archiveTimer = setInterval(tick, 1000);
    }

    function detailRow(label, value) {
      const row = document.createElement('div');
      row.className = 'detail-row';

      const key = document.createElement('span');
      key.textContent = label;

      const val = document.createElement('span');
      val.textContent = value || 'Unknown';
      val.title = val.textContent;

      row.appendChild(key);
      row.appendChild(val);
      return row;
    }

    function renderDetail(title, rows, note) {
      const detail = el('detail');
      detail.textContent = '';

      const strong = document.createElement('strong');
      strong.textContent = title;
      strong.title = title;
      detail.appendChild(strong);

      const grid = document.createElement('div');
      grid.className = 'detail-grid';
      for (const row of rows) {
        grid.appendChild(detailRow(row[0], row[1]));
      }
      detail.appendChild(grid);

      if (note) {
        const info = document.createElement('div');
        info.className = 'detail-note';
        info.textContent = note;
        detail.appendChild(info);
      }
    }

    function selectedPaths() {
      return Array.from(state.selected).map((name) => joinPath(state.path, name));
    }

    function selectedEntries() {
      return state.entries.filter((entry) => state.selected.has(entry.name));
    }

    async function loadFolderSize(path, token, entry) {
      try {
        const du = await api('/api/fs/du?path=' + encodeURIComponent(path));
        if (token !== state.detailToken) return;
        if (!state.selected.has(entry.name)) return;

        const rows = [
          ['Kind', 'Folder'],
          ['Size', exactSize(du.size)],
          ['Files', String(du.files || 0)],
          ['Folders', String(Math.max(0, (du.dirs || 0) - 1))],
          ['Path', path]
        ];
        const note = 'Full recursive size calculated on selection only.';
        renderDetail(entry.name, rows, note);
      } catch (err) {
        if (token !== state.detailToken) return;
        const rows = [
          ['Kind', 'Folder'],
          ['Size', exactSize(entry.size)],
          ['Modified', formatDate(entry.mtime)],
          ['Path', path]
        ];
        renderDetail(entry.name, rows, 'Could not calculate folder size: ' + err.message);
      }
    }

    function updatePlaces() {
      document.querySelectorAll('#places button').forEach((button) => {
        button.classList.toggle('active', cleanPath(button.dataset.path) === state.path);
      });
      const currentCustom = state.places.some((place) => {
        return place.custom && cleanPath(place.path) === state.path;
      });
      const targetCustom = state.places.some((place) => place.custom &&
        cleanPath(place.path) === cleanPath(el('target-path').value || ''));
      el('remove-shortcut').disabled = !currentCustom && !targetCustom;
      el('customize-shortcut').disabled = !currentCustom && !targetCustom;
    }

    function updateSelection() {
      const token = ++state.detailToken;
      const entries = selectedEntries();
      el('selection').textContent = entries.length + ' selected';

      const detail = el('detail');
      if (!entries.length) {
        renderDetail('No selection', [
          ['Path', state.path],
          ['Items', state.entries.length + ' visible']
        ], 'Select a file or folder to see size and modified date.');
        return;
      }

      const dirs = entries.filter((entry) => entry.dir).length;
      const files = entries.length - dirs;
      if (entries.length === 1) {
        const entry = entries[0];
        const path = joinPath(state.path, entry.name);
        const rows = [
          ['Kind', entry.dir ? 'Folder' : 'File'],
          ['Size', exactSize(entry.size)],
          ['Modified', formatDate(entry.mtime)],
          ['Path', path]
        ];
        let note = '';
        if (entry.dir) {
          note = 'Calculating full folder size...';
          loadFolderSize(path, token, entry);
        }
        renderDetail(entry.name, rows, note);
        return;
      }

      const totalFileBytes = entries.reduce((sum, entry) => {
        return entry.dir || !Number.isFinite(entry.size) ? sum : sum + entry.size;
      }, 0);
      renderDetail(entries.length + ' items', [
        ['Files', String(files)],
        ['Folders', String(dirs)],
        ['File size', exactSize(totalFileBytes)],
        ['Location', state.path]
      ], dirs ? 'Folder contents are not included in the total.' : '');
    }

    function makeRow(entry, parent) {
      const row = document.createElement('div');
      row.className = 'file-row ' + (entry.dir ? 'dir ' : '') + (parent ? 'parent' : '');
      row.innerHTML =
        '<span class="tag"></span><span class="name"></span><span class="muted-cell type"></span><span class="muted-cell mtime"></span>';

      row.querySelector('.tag').textContent = entry.dir ? 'DIR' : 'FILE';
      row.querySelector('.name').textContent = entry.name;
      row.querySelector('.type').textContent = parent ? '' : (entry.dir ? 'folder' : shortSize(entry.size || 0));
      row.querySelector('.mtime').textContent = entry.mtime ? new Date(entry.mtime * 1000).toLocaleDateString() : '';

      if (!parent && state.selected.has(entry.name)) {
        row.classList.add('selected');
      }

      row.addEventListener('click', (event) => {
        if (parent) {
          openPath(parentPath(state.path));
          return;
        }
        if (event.ctrlKey || event.metaKey) {
          if (state.selected.has(entry.name)) state.selected.delete(entry.name);
          else state.selected.add(entry.name);
        } else {
          state.selected.clear();
          state.selected.add(entry.name);
        }
        drawList();
      });

      row.addEventListener('dblclick', () => {
        if (parent) return;
        const next = joinPath(state.path, entry.name);
        if (entry.dir) {
          openPath(next);
        } else {
          window.open(fileUrl(next), '_blank');
        }
      });

      return row;
    }

    function drawList() {
      const list = el('list');
      list.textContent = '';

      const head = document.createElement('div');
      head.className = 'file-head';
      head.innerHTML = '<span>Kind</span><span>Name</span><span>Type</span><span>Modified</span>';
      list.appendChild(head);

      if (state.path !== '/') {
        list.appendChild(makeRow({ name: '..', dir: true }, true));
      }

      for (const entry of state.entries) {
        list.appendChild(makeRow(entry, false));
      }

      updatePlaces();
      updateSelection();
    }

    function showLoading() {
      const list = el('list');
      list.textContent = '';
      const head = document.createElement('div');
      head.className = 'file-head';
      head.innerHTML = '<span>Kind</span><span>Name</span><span>Type</span><span>Modified</span>';
      const row = document.createElement('div');
      row.className = 'file-row';
      row.innerHTML = '<span class="tag">...</span><span class="name">Loading</span><span></span><span></span>';
      list.appendChild(head);
      list.appendChild(row);
    }

    async function refresh() {
      state.path = cleanPath(el('path').value || state.path);
      el('path').value = state.path;
      showLoading();

      try {
        const data = await api('/api/fs/list?path=' + encodeURIComponent(state.path));
        state.entries = sortEntries(data.entries || []);
        state.selected.clear();
        drawList();
      } catch (err) {
        state.entries = [];
        drawList();
        toast(err.message, 'err');
      }
    }

    async function openPath(path) {
      state.path = cleanPath(path);
      el('path').value = state.path;
      await refresh();
    }

    async function transfer(verb) {
      const paths = selectedPaths();
      const target = cleanPath(el('target-path').value);
      if (!paths.length) {
        toast('No selection', 'err');
        return;
      }

      for (const source of paths) {
        try {
          await api('/api/fs/' + verb +
            '?src=' + encodeURIComponent(source) +
            '&dst=' + encodeURIComponent(target));
          pollJob();
          const done = await waitJobIdle();
          if (done.error) throw new Error(done.error);
        } catch (err) {
          if ((err.message || '').toLowerCase().includes('job')) pollJob();
          toast(verb + ': ' + err.message, 'err');
          break;
        }
      }

      await refresh();
    }

    async function waitJobIdle() {
      let missed = 0;
      for (;;) {
        try {
          const job = await api('/api/fs/job/status');
          missed = 0;
          if (!job.busy) return job;
        } catch (err) {
          missed++;
          if (missed >= 600) throw err;
        }
        await new Promise((resolve) => setTimeout(resolve, 700));
      }
    }

    async function makeFolder() {
      const name = prompt('Folder name');
      if (!name) return;
      try {
        await api('/api/fs/mkdir?path=' + encodeURIComponent(joinPath(state.path, name)));
        await refresh();
        toast('Folder created', 'ok');
      } catch (err) {
        toast('mkdir: ' + err.message, 'err');
      }
    }

    async function renameOne() {
      const entries = selectedEntries();
      if (entries.length !== 1) {
        toast('Select one item', 'err');
        return;
      }
      const next = prompt('New name', entries[0].name);
      if (!next || next === entries[0].name) return;
      try {
        await api('/api/fs/rename?src=' +
          encodeURIComponent(joinPath(state.path, entries[0].name)) +
          '&dst=' + encodeURIComponent(joinPath(state.path, next)));
        await refresh();
        toast('Renamed', 'ok');
      } catch (err) {
        toast('rename: ' + err.message, 'err');
      }
    }

    function downloadSelected() {
      const entries = selectedEntries();
      if (entries.length !== 1 || entries[0].dir) {
        toast('Select one file', 'err');
        return;
      }
      window.open(fileUrl(joinPath(state.path, entries[0].name)), '_blank');
    }

    async function extractSelected() {
      const entries = selectedEntries();
      if (entries.length !== 1 || entries[0].dir) {
        toast('Select one archive file', 'err');
        return;
      }
      if (!isArchiveName(entries[0].name)) {
        toast('Supported archives: rar, 7z, 7z.001, zip', 'err');
        return;
      }

      const source = joinPath(state.path, entries[0].name);
      const suggested = joinPath(state.path, archiveStem(entries[0].name));
      const destination = cleanPath(prompt('Extract to folder', suggested) || '');
      if (!destination || destination === '/') return;
      const password = prompt('Archive password (leave blank if none)', '');
      if (password === null) return;

      try {
        await postForm('/api/fs/archive/prepare', {
          src: source,
          dst: destination,
          password,
          threads: '0'
        });
        toast('Archive extraction started', 'ok');
        pollArchiveStatus();
      } catch (err) {
        toast('extract: ' + err.message, 'err');
      }
    }

    async function deleteSelected() {
      const paths = selectedPaths();
      if (!paths.length) {
        toast('No selection', 'err');
        return;
      }
      if (!confirm('Delete ' + paths.length + ' item(s)?')) return;

      for (const path of paths) {
        try {
          await api('/api/fs/delete?recursive=1&path=' + encodeURIComponent(path));
          pollJob();
          const done = await waitJobIdle();
          if (done.error) throw new Error(done.error);
        } catch (err) {
          if ((err.message || '').toLowerCase().includes('job')) pollJob();
          toast('delete: ' + err.message, 'err');
          break;
        }
      }
      await refresh();
    }

    function uploadOne(file, relPath, onProgress) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        let url = '/api/fs/upload?path=' + encodeURIComponent(state.path) +
          '&filename=' + encodeURIComponent(file.name);
        if (relPath) url += '&relpath=' + encodeURIComponent(relPath);

        function clearXhr() {
          if (state.uploadXhr === xhr) state.uploadXhr = null;
        }

        state.uploadXhr = xhr;
        xhr.open('POST', url);
        xhr.upload.onprogress = (event) => {
          const loaded = Math.min(file.size, Number(event.loaded || 0));
          if (onProgress) onProgress(loaded);
        };
        xhr.onload = () => {
          clearXhr();
          let body = {};
          try { body = JSON.parse(xhr.responseText || '{}'); } catch (err) {}
          if (xhr.status >= 200 && xhr.status < 300 && body.ok !== false) {
            resolve(body);
          } else {
            reject(new Error(body.error || ('HTTP ' + xhr.status)));
          }
        };
        xhr.onerror = () => {
          clearXhr();
          reject(new Error('network error'));
        };
        xhr.onabort = () => {
          clearXhr();
          reject(new Error('upload cancelled'));
        };
        xhr.send(file);
      });
    }

    async function uploadFiles(files) {
      if (!files || !files.length || state.uploadBusy) return;
      state.uploadBusy = true;
      state.uploadAbort = false;
      state.uploadXhr = null;
      let ok = 0;
      let failed = 0;
      let uploadedBytes = 0;
      const totalBytes = files.reduce((sum, file) => sum + (file.size || 0), 0);
      const startedAt = Date.now();

      updateUploadJob(0, totalBytes, startedAt, 0, files.length, 'Preparing', failed, false);

      for (let index = 0; index < files.length; index++) {
        const file = files[index];
        if (state.uploadAbort) break;
        const relPath = file.webkitRelativePath ?
          file.webkitRelativePath.split('/').slice(0, -1).join('/') : '';
        try {
          await uploadOne(file, relPath, (loaded) => {
            updateUploadJob(uploadedBytes + loaded, totalBytes, startedAt,
              index, files.length, file.name, failed, state.uploadAbort);
          });
          ok++;
          uploadedBytes += file.size || 0;
          updateUploadJob(uploadedBytes, totalBytes, startedAt,
            index, files.length, file.name, failed, false);
          toast('Uploaded ' + ok + ' / ' + files.length, 'ok');
        } catch (err) {
          if (state.uploadAbort || err.message === 'upload cancelled') {
            state.uploadAbort = true;
            updateUploadJob(uploadedBytes, totalBytes, startedAt,
              index, files.length, file.name, failed, true);
            break;
          }
          failed++;
          updateUploadJob(uploadedBytes, totalBytes, startedAt,
            index, files.length, file.name, failed, false);
          toast('upload: ' + err.message, 'err');
        }
      }

      state.uploadBusy = false;
      state.uploadXhr = null;
      await refresh();
      if (state.uploadAbort) {
        toast('Upload cancelled after ' + ok + ' file(s)', 'err');
      } else {
        toast(ok + ' uploaded' + (failed ? ', ' + failed + ' failed' : ''), failed ? 'err' : 'ok');
      }
      setTimeout(() => {
        if (!state.uploadBusy && !state.jobTimer && !state.jobHideTimer) {
          el('job').classList.remove('show');
        }
      }, 1600);
    }

    function pollJob() {
      const box = el('job');
      const fill = el('job-fill');
      const text = el('job-text');
      const verb = el('job-verb');

      if (state.jobTimer) clearInterval(state.jobTimer);
      if (state.jobHideTimer) {
        clearTimeout(state.jobHideTimer);
        state.jobHideTimer = 0;
      }
      box.classList.add('show');
      el('job-cancel').disabled = false;
      text.textContent = 'Starting';
      let missed = 0;

      state.jobTimer = setInterval(async () => {
        try {
          const job = await api('/api/fs/job/status');
          missed = 0;
          const pct = job.totalBytes > 0 ?
            Math.max(0, Math.min(100, (job.copiedBytes / job.totalBytes) * 100)) : 0;
          fill.style.width = pct.toFixed(1) + '%';
          verb.textContent = job.verb || 'Working';
          text.textContent = jobProgressText(job);

          if (!job.busy) {
            clearInterval(state.jobTimer);
            state.jobTimer = 0;
            if (job.error) toast(job.error, 'err');
            state.jobHideTimer = setTimeout(async () => {
              state.jobHideTimer = 0;
              try {
                const latest = await api('/api/fs/job/status');
                if (latest.busy) {
                  pollJob();
                  return;
                }
              } catch (err) {}
              if (!state.uploadBusy && !state.jobTimer) box.classList.remove('show');
            }, 1400);
          }
        } catch (err) {
          missed++;
          text.textContent = 'Waiting for status...';
          if (missed >= 600) {
            clearInterval(state.jobTimer);
            state.jobTimer = 0;
            box.classList.remove('show');
            toast('Lost job status: ' + err.message, 'err');
          }
        }
      }, 500);
    }

    async function boot() {
      renderPlaces();
      await refreshPlaces(false);

      el('up').addEventListener('click', () => openPath(parentPath(state.path)));
      el('go').addEventListener('click', refresh);
      el('refresh').addEventListener('click', refresh);
      el('add-shortcut').addEventListener('click', addShortcut);
      el('remove-shortcut').addEventListener('click', removeShortcut);
      el('customize-shortcut').addEventListener('click', customizeShortcut);
      el('path').addEventListener('keydown', (event) => {
        if (event.key === 'Enter') refresh();
      });

      el('new-folder').addEventListener('click', makeFolder);
      el('rename').addEventListener('click', renameOne);
      el('download').addEventListener('click', downloadSelected);
      el('extract').addEventListener('click', extractSelected);
      el('delete').addEventListener('click', deleteSelected);
      el('copy').addEventListener('click', () => transfer('copy'));
      el('move').addEventListener('click', () => transfer('move'));
      el('target-current').addEventListener('click', () => {
        el('target-path').value = state.path;
      });
      el('open-target').addEventListener('click', () => {
        openPath(el('target-path').value);
      });
      el('target-path').addEventListener('input', updatePlaces);
      el('job-cancel').addEventListener('click', () => {
        if (state.archiveTimer) {
          toast('Archive extraction cannot be cancelled yet', 'err');
          return;
        }
        if (state.uploadBusy) {
          state.uploadAbort = true;
          if (state.uploadXhr) state.uploadXhr.abort();
          setJobBox('upload', 'Cancelling upload...', 0);
          return;
        }
        fetch('/api/fs/job/cancel').catch(() => {});
      });

      el('upload-files').addEventListener('click', () => {
        el('file-picker').value = '';
        el('file-picker').click();
      });
      el('upload-folder').addEventListener('click', () => {
        if (!('webkitdirectory' in document.createElement('input'))) {
          toast('Folder picking is not available in this browser', 'err');
          return;
        }
        el('folder-picker').value = '';
        el('folder-picker').click();
      });
      el('file-picker').addEventListener('change', (event) => {
        uploadFiles(Array.from(event.target.files || []));
      });
      el('folder-picker').addEventListener('change', (event) => {
        uploadFiles(Array.from(event.target.files || []));
      });

      await refresh();
      if (!state.placesTimer) {
        state.placesTimer = setInterval(() => refreshPlaces(true), 8000);
      }

      api('/api/status').then((info) => {
        const status = el('status');
        status.classList.add('ready');
        status.querySelector('span:last-child').textContent = 'Ready';
        el('build').textContent = (info.tag || 'bfpilot') + ' / port 5905';
      }).catch(() => {
        el('status').querySelector('span:last-child').textContent = 'Offline';
      });

      api('/api/fs/job/status').then((job) => {
        if (job.busy) pollJob();
      }).catch(() => {});
      api('/api/fs/archive/status').then((job) => {
        if (job.state === 'prepared' || job.state === 'running' || job.state === 'finalizing') {
          pollArchiveStatus();
        }
      }).catch(() => {});
    }

    boot();
  </script>
</body>
</html>
